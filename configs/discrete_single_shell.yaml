seed: 42
dtype: float64
device: cpu

body:
  R_body: 1.0
  normalize_positions: true

data:
  type: synthetic
  path:
  train_fraction: 0.8
  seed: 42
  synthetic_n_query: 512
  synthetic_n_truth_sources: 64
  synthetic_query_radius_min: 1.05
  synthetic_query_radius_max: 1.60
  synthetic_truth_shell_radius: 0.72
  synthetic_noise_std: 0.0

model:
  type: discrete
  shell_alpha: 0.86
  n_source: 512
  weight_mode: surface_area

kernel:
  eps: 0.0
  acceleration_sign: 1.0
  query_chunk_size: 2048
  source_chunk_size: 512

solver:
  type: ridge
  ridge_method: augmented_lstsq
  lambda_l2: 1.0e-6
  column_normalize: true

loss:
  use_potential: true
  use_acceleration: true
  normalize_targets: false
  potential_scale: auto
  acceleration_scale: auto
  lambda_potential: 0.2
  lambda_acceleration: 1.0
  lambda_l2: 1.0e-6
  lambda_moment: 1.0e-4
  lambda_dipole: 1.0
  shell_energy_weights: []

split:
  type: random
  train_fraction: 0.8

output:
  output_dir: outputs
  run_name: discrete_single_shell
  save_plots: false
