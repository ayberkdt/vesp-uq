base:
  device: cpu
  dtype: float64
  output:
    output_dir: outputs/feasibility
  kernel:
    eps: 0.0
    acceleration_sign: 1.0
    source_chunk_size: 512
  solver:
    type: ridge
    ridge_method: augmented_lstsq
    lambda_l2: 1.0e-8
    column_normalize: true
  loss:
    use_potential: true
    use_acceleration: true
    normalize_targets: false
    potential_scale: auto
    acceleration_scale: auto
    lambda_potential: 0.2
    lambda_acceleration: 1.0
    lambda_l2: 1.0e-8
    lambda_moment: 1.0e-6
    lambda_dipole: 1.0
    shell_energy_weights: []

feasibility:
  same_family_tol: 2.0e-6
  radius_mismatch_tol: 5.0e-3
  noisy_tol: 2.0e-2
  high_ood_factor: 5.0
  low_ood_factor: 25.0
  max_top5_source_contribution: 0.45
