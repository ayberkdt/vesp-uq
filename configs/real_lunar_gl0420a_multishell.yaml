# Conservative multi-shell real lunar default (post-hardening).
# Rationale:
#   - shell_alphas [0.70, 0.86, 0.95] include shells nearer the surface for the
#     dominant low-altitude residual components (drops the deep 0.50 shell that
#     attracted the collapse).
#   - lambda_l2 = 30 (NOT 1e-5). The multi-shell "collapse" was a brittle near-
#     cancellation: adjacent near-redundant shells fit the field with huge opposing
#     source strengths that nearly cancel (shell_cancellation_ratio ~143, sigma_l2
#     ~9.3). That cancellation lives in the operator's near-null space, so proper
#     Tikhonov regularization removes it at essentially zero data cost
#     (rel_acc 0.192 -> 0.195, cancellation 143 -> 4.5, sigma_l2 9.3 -> 0.085).
#     See the regularization ablation for the full sweep.
# The legacy setup is preserved in real_lunar_gl0420a_multishell_legacy.yaml.
seed: 42
device: cpu
dtype: float64

body:
  R_body: 1.0
  normalize_positions: true
  physical_R_body: 1738.0
  physical_R_body_units: km
  position_units: normalized
  potential_units: km^2/s^2
  acceleration_units: km/s^2

data:
  type: csv
  path: data/lunar_grail_gl0420a_L60_residual.csv
  train_fraction: 0.8
  seed: 42

model:
  type: multishell
  shell_alphas: [0.70, 0.86, 0.95]
  n_sources_per_shell: [384, 512, 384]
  weight_mode: surface_area

kernel:
  eps: 0.0
  acceleration_sign: 1.0
  source_chunk_size: 1024

solver:
  type: ridge
  ridge_method: augmented_lstsq
  lambda_l2: 30.0
  column_normalize: true

loss:
  use_potential: true
  use_acceleration: true
  normalize_targets: true
  potential_scale: auto
  acceleration_scale: auto
  lambda_potential: 0.2
  lambda_acceleration: 1.0
  lambda_l2: 30.0
  lambda_moment: 1.0e-4
  lambda_dipole: 1.0
  shell_energy_weights: []

split:
  type: random
  radius_units: normalized
  train_fraction: 0.8

evaluation:
  batch_size: 4096
  n_altitude_bins: 6

output:
  output_dir: outputs
  run_name: real_lunar_gl0420a_multishell
  save_plots: false
